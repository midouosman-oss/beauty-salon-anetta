<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Салон краси Аннета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --text:#f4f4f7;
  --muted:#a1a1ad;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

nav div{
  font-size:11px;
  letter-spacing:.25em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* MAIN PHOTO */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(201,169,110,.25), transparent 60%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
    url("./IMG_2117.jpeg") center/cover;
  transform:scale(1.1);
  transition:12s ease;
}

.hero:hover::before{
  transform:scale(1.16);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:58px;
  font-weight:300;
}

p{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:24px;
  padding:14px 34px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:14px;
  transition:.35s;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* FLOAT */
.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  z-index:999;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:34px;
  font-weight:300;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.05);
  padding:26px;
  border-radius:16px;
  backdrop-filter:blur(14px);
  transition:.5s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:.4s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.06);
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:none;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

.small{
  color:var(--muted);
  font-size:13px;
}

/* ===== ПОСЛУГИ ПОРТФОЛИО ===== */
.services-portfolio {
  padding:120px 20px;
  max-width:1200px;
  margin:auto;
}

.services-portfolio h2 {
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:48px;
  font-weight:300;
  margin-bottom:80px;
  text-align:center;
  letter-spacing:.08em;
}

/* ПОСЛУГА СЕКЦІЯ */
.service-block {
  margin-bottom:100px;
  animation:slideUp .8s ease forwards;
  opacity:0;
}

.service-block:nth-child(1) {
  animation-delay:0.1s;
}

.service-block:nth-child(2) {
  animation-delay:0.2s;
}

.service-block:nth-child(3) {
  animation-delay:0.3s;
}

.service-block:nth-child(4) {
  animation-delay:0.4s;
}

@keyframes slideUp {
  from {
    opacity:0;
    transform:translateY(40px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}

/* ЗАГОЛОВОК ПОСЛУГИ */
.service-title {
  font-family:'Cormorant Garamond';
  font-size:36px;
  font-weight:300;
  color:var(--text);
  margin-bottom:50px;
  padding-bottom:24px;
  border-bottom:2px solid var(--gold);
  letter-spacing:.05em;
  position:relative;
}

.service-title::before {
  content:"";
  position:absolute;
  bottom:-2px;
  left:0;
  height:2px;
  background:var(--gold);
  transition:width .6s ease;
}

/* СЕТКА ПОРТФОЛИО */
.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:24px;
}

.portfolio-item {
  position:relative;
  border-radius:18px;
  overflow:hidden;
  aspect-ratio:1;
  background:linear-gradient(135deg, rgba(201,169,110,.1), rgba(201,169,110,.05));
  border:1px solid rgba(201,169,110,.2);
  transition:.5s cubic-bezier(.4, 0, .2, 1);
  cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.2);
}

.portfolio-item::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
  transition:.4s ease;
  z-index:2;
}

.portfolio-item:hover::before {
  background:rgba(0,0,0,.1);
}

.portfolio-item:hover {
  transform:scale(1.06);
  border-color:var(--gold);
  box-shadow:0 20px 50px rgba(201,169,110,.2);
}

.portfolio-item img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:.5s cubic-bezier(.4, 0, .2, 1);
}

.portfolio-item:hover img {
  transform:scale(1.1);
}

/* ПРЕМИУМ СПЕЙСИНГ */
.service-block:last-child {
  margin-bottom:0;
}

/* МОДАЛЬНОЕ ОКНО */
.modal {
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.96);
  backdrop-filter:blur(12px);
}

.modal.active {
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content {
  position:relative;
  max-width:90%;
  max-height:90vh;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(201,169,110,.3);
}

.modal-content img {
  width:100%;
  height:auto;
  display:block;
}

.modal-close {
  position:absolute;
  top:20px;
  right:20px;
  background:var(--gold);
  border:none;
  width:44px;
  height:44px;
  border-radius:50%;
  cursor:pointer;
  font-size:24px;
  color:#000;
  z-index:10;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:300;
}

.modal-close:hover {
  transform:scale(1.2);
  box-shadow:0 10px 30px rgba(201,169,110,.4);
}

.modal-nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(201,169,110,.9);
  border:none;
  width:56px;
  height:56px;
  border-radius:50%;
  cursor:pointer;
  font-size:28px;
  color:#000;
  z-index:10;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:300;
}

.modal-nav:hover {
  background:var(--gold);
  transform:translateY(-50%) scale(1.15);
  box-shadow:0 12px 36px rgba(201,169,110,.3);
}

.modal-prev {
  left:20px;
}

.modal-next {
  right:20px;
}

/* RESPONSIVE */
@media(max-width:768px) {
  .services-portfolio h2 {
    font-size:36px;
    margin-bottom:60px;
  }

  .service-title {
    font-size:28px;
    margin-bottom:40px;
  }

  .portfolio-grid {
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:16px;
  }

  .service-block {
    margin-bottom:70px;
  }
}

@media(max-width:480px) {
  .services-portfolio {
    padding:80px 16px;
  }

  .services-portfolio h2 {
    font-size:28px;
    margin-bottom:50px;
  }

  .service-title {
    font-size:24px;
    margin-bottom:32px;
  }

  .portfolio-grid {
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:12px;
  }

  .service-block {
    margin-bottom:50px;
  }

  .modal-nav {
    width:48px;
    height:48px;
    font-size:20px;
  }
}
</style>
</head>

<body>

<nav id="nav">
  <div>Аннета</div>
  <div>Салон краси</div>
</nav>

<a class="float"
href="https://wa.me/380937565071?text=Привіт!%20Хочу%20записатися%20в%20салон%20краси%20Аннета%20✨">
Запис у WhatsApp

<section class="hero">
  <div class="hero-content reveal">

<!-- ПОСЛУГИ ПОРТФОЛИО -->
<section class="services-portfolio reveal">
  <h2>Послуги</h2>

  <div class="service-block">

  </a>

<!-- МОДАЛЬНЕ ВІКНО ДЛЯ ПЕРЕГЛЯДУ ПОВНОГО РОЗМІРУ -->
<div class="modal" id="imageModal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal-content">
    <img id="modalImage" src="" alt="Повне зображення">
  </div>
  <button class="modal-nav modal-prev" onclick="prevImage()">❮</button>
  <button class="modal-nav modal-next" onclick="nextImage()">❯</button>
</div>

<script>
// НАВІГАЦІЯ
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>60);
});

// REVEAL АНІМАЦІЯ
const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));

// МОДАЛЬНІ ВІКНА
let currentModal = null;
let currentImageIndex = 0;

function openModal(event, serviceType) {
  const img = event.target;
  const gallery = img.closest(".portfolio-grid");
  const images = Array.from(gallery.querySelectorAll("img"));
  
  currentImageIndex = images.indexOf(img);
  currentModal = images;
  
  document.getElementById("imageModal").classList.add("active");
  document.getElementById("modalImage").src = img.src;
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("active");
  currentModal = null;
}

function nextImage() {
  if (currentModal) {
    currentImageIndex = (currentImageIndex + 1) % currentModal.length;
    document.getElementById("modalImage").src = currentModal[currentImageIndex].src;
  }
}

function prevImage() {
  if (currentModal) {
    currentImageIndex = (currentImageIndex - 1 + currentModal.length) % currentModal.length;
    document.getElementById("modalImage").src = currentModal[currentImageIndex].src;
  }
}

// ЗАКРИТИ МОДАЛЬ ЯКЩО НАТИСНУТИ НА ПУСТЕ МІСЦЕ
document.getElementById("imageModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ЗАКРИТИ МОДАЛЬ НА ESC
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight") nextImage();
  if (e.key === "ArrowLeft") prevImage();
});
</script>

</body>
</html>
