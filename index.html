<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Салон краси Аннета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --pink:#E8B4C4;
  --text:#f4f4f7;
  --muted:#a1a1ad;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

nav div{
  font-size:11px;
  letter-spacing:.25em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:var(--pink);
  transform:scale(1.1);
  transition:12s ease;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
    url("./IMG_2117.jpeg") center/cover;
  transform:scale(1.1);
  transition:12s ease;
}

.hero:hover::before,
.hero:hover::after{
  transform:scale(1.16);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:58px;
  font-weight:300;
}

.hero-subtitle{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

.btn{
  display:inline-block;
  margin-top:24px;
  padding:14px 34px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:14px;
  transition:.35s;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  z-index:999;
}

.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:34px;
  font-weight:300;
  margin-bottom:40px;
}

.section-description{
  font-size:14px;
  color:var(--muted);
  margin-bottom:30px;
  line-height:1.6;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery.large{
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
}

.gallery img,
.gallery video{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:14px;
  transition:.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

.contact-info{
  margin:30px 0;
  font-size:14px;
  color:var(--muted);
}

.contact-telegram a{
  color:var(--gold);
  text-decoration:none;
}
</style>
</head>

<body>

<nav id="nav">
  <div>Аннета</div>
  <div>Салон краси</div>
</nav>

<a class="float" href="https://t.me/anetta11101" target="_blank">
Записатися в Telegram
</a>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Салон краси Аннета</h1>
    <p class="hero-subtitle">Краса, стиль та професійний догляд</p>
    <a class="btn" href="https://t.me/anetta11101">Записатися</a>
  </div>
</section>

<!-- HAIR -->
<section class="section">
  <h2>Волосся та зачіски</h2>
  <div class="gallery large">
    <img src="./IMG_2169.jpeg">
    <img src="./IMG_2172.jpeg">
    <img src="./IMG_2176.jpeg">
  </div>
</section>

<!-- EYELASHES -->
<section class="section">
  <h2>Вії</h2>
  <div class="gallery">
    <img src="./IMG_2164.jpeg" alt="Вії 1">
    <img src="./IMG_2165.jpeg" alt="Вії 2">
    <img src="./IMG_2173.jpeg" alt="Вії 3">
  </div>
</section>

<!-- COSMETICS -->
<section class="section">
  <h2>Професійна косметика</h2>
  <div class="gallery large">
    <img src="./salon_about.jpg" alt="Косметика 1">
    <img src="./IMG_2171.jpeg" alt="Косметика 2">
  </div>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>Про салон</h2>
  <div class="gallery large">
    <img src="./IMG_2177.jpeg" alt="Лазерна епіляція">
    <img src="./IMG_2166.jpeg" alt="Про салон 1">
    <img src="./IMG_2167.jpeg" alt="Про салон 2">
    <img src="./IMG_2174.jpeg" alt="Про салон 3">
  </div>
</section>

<!-- CONTACT -->
<section class="contact">
  <h2>Контакти</h2>
  <p>@anetta11101</p>
</section>

</body>
</html>
