<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Салон краси Аннета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --text:#f4f4f7;
  --muted:#a1a1ad;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

nav div{
  font-size:11px;
  letter-spacing:.25em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* MAIN PHOTO */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(201,169,110,.25), transparent 60%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
    url("./IMG_2117.jpeg") center/cover;
  transform:scale(1.1);
  transition:12s ease;
}

.hero:hover::before{
  transform:scale(1.16);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:58px;
  font-weight:300;
}

p{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:24px;
  padding:14px 34px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:14px;
  transition:.35s;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* FLOAT */
.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  z-index:999;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:34px;
  font-weight:300;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.05);
  padding:26px;
  border-radius:16px;
  backdrop-filter:blur(14px);
  transition:.5s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:14px;
  transition:.3s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:none;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

.small{
  color:var(--muted);
  font-size:13px;
}

/* ===== ПОСЛУГИ ===== */
.service-block{
  margin-bottom:60px;
}

.service-block h3{
  font-family:'Cormorant Garamond';
  font-size:26px;
  color:#C9A96E;
  margin-bottom:14px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(8px);
}

.modal.active {
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content {
  position:relative;
  max-width:90%;
  max-height:90vh;
  border-radius:16px;
  overflow:hidden;
}

.modal-content img {
  width:100%;
  height:auto;
  display:block;
}

.modal-close {
  position:absolute;
  top:20px;
  right:20px;
  background:var(--gold);
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  font-size:24px;
  color:#000;
  z-index:10;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-close:hover {
  transform:scale(1.15);
}

.modal-nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(201,169,110,.8);
  border:none;
  width:50px;
  height:50px;
  border-radius:50%;
  cursor:pointer;
  font-size:24px;
  color:#000;
  z-index:10;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-nav:hover {
  background:var(--gold);
  transform:translateY(-50%) scale(1.1);
}

.modal-prev {
  left:20px;
}

.modal-next {
  right:20px;
}

/* RESPONSIVE */
@media(max-width:768px) {
  .section h2 {
    font-size:28px;
  }

  .service-block h3 {
    font-size:22px;
  }

  .gallery{
    grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
    gap:8px;
  }

  .gallery img{
    height:150px;
  }
}

@media(max-width:480px) {
  .section{
    padding:60px 16px;
  }

  .section h2 {
    font-size:24px;
  }

  .service-block{
    margin-bottom:40px;
  }

  .service-block h3{
    font-size:20px;
  }

  .gallery{
    grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
    gap:6px;
  }

  .gallery img{
    height:120px;
  }
}
</style>
</head>

<body>

<nav id="nav">
  <div>Аннета</div>

</nav>

<a class="float"
href="https://wa.me/380937565071?text=Привіт!%20Хочу%20записатися%20в%20салон%20краси%20Аннета%20✨">
Записатися в Telegram
</a>

<section class="hero">
  <div class="hero-content reveal">
    <h1>Салон краси Аннета</h1>
    <p>Манікюр · Брови · Догляд за волоссям · Косметологія</p>

 <a class="btn"
   href="https://t.me/anetta11101"
   target="_blank">
   Записатися в Telegram
</a>
  </div>
</section>

<!-- ПОСЛУГИ -->
<section class="section">
  <h2 class="reveal">Послуги</h2>

  <div class="service-block reveal">
    <h3>💅 Манікюр</h3>
    <div class="gallery">
      <img src="./manicure_1.jpg" alt="Манікюр 1" onclick="openModal(event, 'manicure')">
      <img src="./IMG_2118.jpeg" alt="Манікюр 2" onclick="openModal(event, 'manicure')">
      <img src="./IMG_2119.jpeg" alt="Манікюр 3" onclick="openModal(event, 'manicure')">
    </div>
  </div>

  <div class="service-block reveal">
    <h3>✨ Брови</h3>
    <div class="gallery">
      <img src="./IMG_2120.jpeg" alt="Брови 1" onclick="openModal(event, 'eyebrows')">
      <img src="./IMG_2121.jpeg" alt="Брови 2" onclick="openModal(event, 'eyebrows')">
    </div>
  </div>

  <div class="service-block reveal">
    <h3>💇‍♀️ Стрижки та волосся</h3>
    <div class="gallery">
      <img src="./IMG_2122.jpeg" alt="Стрижка 1" onclick="openModal(event, 'haircuts')">
      <img src="./IMG_2117.jpeg" alt="Стрижка 2" onclick="openModal(event, 'haircuts')">

<section class="section">

  <div class="gallery">
    <img src="./IMG_2117.jpeg" onclick="openModal(event, 'portfolio')">
    <img src="./IMG_2118.jpeg" onclick="openModal(event, 'portfolio')">

</section>

  <a class="btn"
  href="https://wa.me/380937565071?text=Привіт!%20Хочу%20записатися%20✨">

  </a>
</section>

<!-- МОДАЛЬНЕ ВІКНО -->
<div class="modal" id="imageModal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal-content">
    <img id="modalImage" src="" alt="Повне зображення">
  </div>
  <button class="modal-nav modal-prev" onclick="prevImage()">❮</button>
  <button class="modal-nav modal-next" onclick="nextImage()">❯</button>
</div>

<script>
// НАВІГАЦІЯ
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>60);
});

// REVEAL АНІМАЦІЯ
const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));

// МОДАЛЬНІ ВІКНА
let currentModal = null;
let currentImageIndex = 0;

function openModal(event, serviceType) {
  const img = event.target;
  const gallery = img.closest(".gallery");
  const images = Array.from(gallery.querySelectorAll("img"));
  
  currentImageIndex = images.indexOf(img);
  currentModal = images;
  
  document.getElementById("imageModal").classList.add("active");
  document.getElementById("modalImage").src = img.src;
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("active");
  currentModal = null;
}

function nextImage() {
  if (currentModal) {
    currentImageIndex = (currentImageIndex + 1) % currentModal.length;
    document.getElementById("modalImage").src = currentModal[currentImageIndex].src;
  }
}

function prevImage() {
  if (currentModal) {
    currentImageIndex = (currentImageIndex - 1 + currentModal.length) % currentModal.length;
    document.getElementById("modalImage").src = currentModal[currentImageIndex].src;
  }
}

// ЗАКРИТИ МОДАЛЬ НА ESC
document.getElementById("imageModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight") nextImage();
  if (e.key === "ArrowLeft") prevImage();
});
</script>

</body>
</html>
