<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Salon Anetta</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --text:#f4f4f7;
  --muted:#9a9aa6;
  --glass:rgba(255,255,255,.06);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(25px);
}

/* HERO CINEMATIC */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(201,169,110,.25), transparent 60%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
    url("./IMG_2117.jpeg") center/cover;
  transform:scale(1.1);
  transition:14s ease;
}

.hero:hover::before{
  transform:scale(1.18);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:64px;
  font-weight:300;
}

p{
  color:var(--muted);
  margin-top:10px;
}

.btn{
  display:inline-block;
  margin-top:22px;
  padding:13px 30px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:12px;
  transition:.3s;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* FLOAT CTA */
.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  z-index:999;
  text-decoration:none;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-weight:300;
  font-size:34px;
  margin-bottom:24px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.card{
  background:var(--glass);
  padding:28px;
  border-radius:16px;
  backdrop-filter:blur(16px);
  transition:.6s cubic-bezier(.2,.8,.2,1);
}

.card:hover{
  transform:translateY(-14px) scale(1.03);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  cursor:pointer;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:.4s;
}

.gallery img:hover{
  transform:scale(1.07);
  filter:brightness(1.1);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.lightbox img{
  max-width:95%;
  max-height:85%;
  border-radius:16px;
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(35px);
  transition:1.1s cubic-bezier(.2,.8,.2,1);
}

.reveal.visible{
  opacity:1;
  transform:none;
}
</style>
</head>

<body>

<nav id="nav">
  <div>Anetta</div>
  <div>Premium Salon</div>
</nav>

<a class="float" href="https://instagram.com/beauty_salon_anetta" target="_blank">
Записатися
</a>

<section class="hero">
  <div class="hero-content reveal">
    <h1>Beauty Salon Anetta</h1>
    <p>Luxury beauty · style · care</p>
    <a class="btn" href="https://instagram.com/beauty_salon_anetta">Instagram запис</a>
  </div>
</section>

<section class="section">
  <h2 class="reveal">Послуги</h2>
  <div class="grid">
    <div class="card reveal">Манікюр</div>
    <div class="card reveal">Брови</div>
    <div class="card reveal">Волосся</div>
    <div class="card reveal">Косметологія</div>
  </div>
</section>

<section class="section">
  <h2 class="reveal">Роботи</h2>
  <div class="gallery">
    <img src="./IMG_2117.jpeg">
    <img src="./IMG_2118.jpeg">
    <img src="./IMG_2119.jpeg">
    <img src="./IMG_2120.jpeg">
    <img src="./IMG_2121.jpeg">
    <img src="./IMG_2122.jpeg">
  </div>
</section>

<div class="lightbox" id="lb">
  <img id="lbImg">
</div>

<script>
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>60);
});

const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));

const lb=document.getElementById("lb");
const img=document.getElementById("lbImg");

document.querySelectorAll(".gallery img").forEach(i=>{
  i.onclick=()=>{
    lb.style.display="flex";
    img.src=i.src;
  }
});

lb.onclick=()=>lb.style.display="none";
</script>

</body>
</html>
