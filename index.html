<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Салон краси Аннета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --text:#f4f4f7;
  --muted:#a1a1ad;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

nav div{
  font-size:11px;
  letter-spacing:.25em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* MAIN PHOTO */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(201,169,110,.25), transparent 60%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
    url("./IMG_2120.jpeg") center/cover;
  transform:scale(1.1);
  transition:12s ease;
}

.hero:hover::before{
  transform:scale(1.16);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:58px;
  font-weight:300;
}

p{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:24px;
  padding:14px 34px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:14px;
  transition:.35s;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* FLOAT */
.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  z-index:999;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:34px;
  font-weight:300;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.05);
  padding:26px;
  border-radius:16px;
  backdrop-filter:blur(14px);
  transition:.5s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:.4s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.06);
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:none;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

.small{
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>

<nav id="nav">
  <div>Аннета</div>
  <div>Салон краси</div>
</nav>

<a class="float"
href="https://wa.me/380937565071?text=Привіт!%20Хочу%20записатися%20в%20салон%20краси%20Аннета%20✨">
Запис у WhatsApp
</a>

<section class="hero">
  <div class="hero-content reveal">
    <h1>Салон краси Аннета</h1>
    <p>Манікюр · Брови · Догляд за волоссям · Косметологія</p>

    <a class="btn"
    href="https://wa.me/380937565071?text=Привіт!%20Хочу%20записатися%20в%20салон%20краси%20Аннета%20✨">
      Записатися
    </a>
  </div>
</section>

<section class="section">
  <h2 class="reveal">Послуги</h2>

  <div class="grid">
    <div class="card reveal">Манікюр</div>
    <div class="card reveal">Брови</div>
    <div class="card reveal">Догляд за волоссям</div>
    <div class="card reveal">Косметологія</div>
  </div>
</section>

<section class="section">
  <h2 class="reveal">Портфоліо</h2>

  <div class="gallery">
    <img src="./IMG_2117.jpeg">
    <img src="./IMG_2118.jpeg">
    <img src="./IMG_2119.jpeg">
    <img src="./IMG_2120.jpeg">
    <img src="./IMG_2121.jpeg">
    <img src="./IMG_2122.jpeg">
  </div>
</section>

<section class="contact reveal">
  <h2>Готові до краси?</h2>
  <p class="small">Запис у WhatsApp за 1 клік</p>

  <a class="btn"
  href="https://wa.me/380937565071?text=Привіт!%20Хочу%20записатися%20✨">
    Записатися зараз
  </a>
</section>

<script>
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>60);
});

const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));
</script>

</body>
</html>
