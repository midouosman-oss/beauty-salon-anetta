<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Салон краси Аннета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --text:#f4f4f7;
  --muted:#a1a1ad;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

nav div{
  font-size:11px;
  letter-spacing:.25em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* MAIN PHOTO */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(201,169,110,.25), transparent 60%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
    url("./IMG_2117.jpeg") center/cover;
  transform:scale(1.1);
  transition:12s ease;
}

.hero:hover::before{
  transform:scale(1.16);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:58px;
  font-weight:300;
}

p{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:24px;
  padding:14px 34px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:14px;
  transition:.35s;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* FLOAT */
.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  z-index:999;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:34px;
  font-weight:300;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.05);
  padding:26px;
  border-radius:16px;
  backdrop-filter:blur(14px);
  transition:.5s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:.4s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.06);
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:none;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

.small{
  color:var(--muted);
  font-size:13px;
}

/* ===== ПОСЛУГИ ПОРТФОЛИО ===== */
.services-portfolio {
  padding:120px 20px;
  max-width:1200px;
  margin:auto;
}

.services-portfolio h2 {
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:42px;
  font-weight:300;
  margin-bottom:60px;
  text-align:center;
  letter-spacing:.08em;
}

/* ТАБИ МЕНЮ */
.services-tabs {
  display:flex;
  justify-content:center;
  gap:16px;
  margin-bottom:60px;
  flex-wrap:wrap;
}

.tab-btn {
  padding:12px 28px;
  background:rgba(201,169,110,.08);
  border:1px solid var(--gold);
  color:var(--gold);
  border-radius:12px;
  cursor:pointer;
  font-size:13px;
  letter-spacing:.12em;
  transition:.4s;
  font-family:Inter;
  text-transform:uppercase;
  font-weight:500;
}

.tab-btn:hover,
.tab-btn.active {
  background:var(--gold);
  color:#000;
  transform:scale(1.05);
}

/* ВКЛАДКИ КОНТЕНТ */
.tab-content {
  display:none;
  animation:fadeIn .6s ease;
}

.tab-content.active {
  display:block;
}

@keyframes fadeIn {
  from {
    opacity:0;
    transform:translateY(15px);
  }
  to {
    opacity:1;
    transform:none;
  }
}

/* ЗАГОЛОВОК ГАЛЕРЕИ */
.gallery-title {
  font-family:'Cormorant Garamond';
  font-size:28px;
  font-weight:300;
  color:var(--text);
  margin-bottom:40px;
  text-align:center;
  letter-spacing:.05em;
  padding-bottom:20px;
  border-bottom:1px solid rgba(201,169,110,.2);
}

/* СЕТКА ПОРТФОЛИО */
.portfolio-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
  gap:20px;
  margin-bottom:60px;
}

.portfolio-item {
  position:relative;
  border-radius:16px;
  overflow:hidden;
  aspect-ratio:1;
  background:rgba(201,169,110,.05);
  border:1px solid rgba(201,169,110,.15);
  transition:.5s ease;
  cursor:pointer;
}

.portfolio-item::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.4);
  transition:.4s ease;
  z-index:2;
}

.portfolio-item:hover::before {
  background:rgba(0,0,0,.1);
}

.portfolio-item:hover {
  transform:scale(1.04);
  border-color:var(--gold);
  box-shadow:0 15px 40px rgba(201,169,110,.15);
}

.portfolio-item img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.portfolio-item:hover img {
  transform:scale(1.08);
}

/* ПРЕМИУМ СПЕЙСИНГ */
.service-section {
  margin-bottom:80px;
}

.service-section:last-child {
  margin-bottom:0;
}

/* МОДАЛЬНОЕ ОКНО */
.modal {
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(8px);
}

.modal.active {
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-content {
  position:relative;
  max-width:90%;
  max-height:90vh;
  border-radius:16px;
  overflow:hidden;
}

.modal-content img {
  width:100%;
  height:auto;
  display:block;
}

.modal-close {
  position:absolute;
  top:20px;
  right:20px;
  background:var(--gold);
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  font-size:24px;
  color:#000;
  z-index:10;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-close:hover {
  transform:scale(1.15);
}

.modal-nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(201,169,110,.8);
  border:none;
  width:50px;
  height:50px;
  border-radius:50%;
  cursor:pointer;
  font-size:24px;
  color:#000;
  z-index:10;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-nav:hover {
  background:var(--gold);
  transform:translateY(-50%) scale(1.1);
}

.modal-prev {
  left:20px;
}

.modal-next {
  right:20px;
}

/* RESPONSIVE */
@media(max-width:768px) {
  .services-portfolio h2 {
    font-size:32px;
    margin-bottom:40px;
  }

  .services-tabs {

    margin-bottom:40px;
  }

  .tab-btn {
    padding:10px 20px;
    font-size:12px;
  }

  .portfolio-grid {
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:14px;
    margin-bottom:40px;
  }

  .gallery-title {
    font-size:22px;
    margin-bottom:30px;
  }

  .service-section {
    margin-bottom:50px;
  }
}

@media(max-width:480px) {

    font-size:26px;
  }

  .services-tabs {

  }

  .tab-btn {
    width:100%;
  }

  .portfolio-grid {
    grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
    gap:10px;
  }

  .gallery-title {
    font-size:18px;
  }
}
</style>
</head>

<!-- МОДАЛЬНОЕ ОКНО ДЛЯ ПРОСМОТРА ПОЛНОГО РАЗМЕРА -->
<div class="modal" id="imageModal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div class="modal-content">
    <img id="modalImage" src="" alt="Полное изображение">
  </div>
  <button class="modal-nav modal-prev" onclick="prevImage()">❮</button>
  <button class="modal-nav modal-next" onclick="nextImage()">❯</button>
</div>

<script>
// НАВИГАЦИЯ
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>60);
});

// REVEAL АНИМАЦИЯ
const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));

// ТАБИ ФУНКЦИОНАЛНОСТЬ
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    const tabId = this.getAttribute("data-tab");
    
    // УБРАТЬ АКТИВНЫЙ КЛАСС У ВСЕХ КНОПОК И КОНТЕНТА
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    
    // ДОБАВИТЬ АКТИВНЫЙ КЛАСС
    this.classList.add("active");
    document.getElementById(tabId).classList.add("active");
  });
});

// МОДАЛЬНЫЕ ОКНА
let currentModal = null;
let currentImageIndex = 0;

function openModal(event, serviceType) {
  const img = event.target;
  const gallery = img.closest(".portfolio-grid");
  const images = Array.from(gallery.querySelectorAll("img"));
  
  currentImageIndex = images.indexOf(img);
  currentModal = images;
  
  document.getElementById("imageModal").classList.add("active");
  document.getElementById("modalImage").src = img.src;
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("active");
  currentModal = null;
}

function nextImage() {
  if (currentModal) {
    currentImageIndex = (currentImageIndex + 1) % currentModal.length;
    document.getElementById("modalImage").src = currentModal[currentImageIndex].src;
  }
}

function prevImage() {
  if (currentModal) {
    currentImageIndex = (currentImageIndex - 1 + currentModal.length) % currentModal.length;
    document.getElementById("modalImage").src = currentModal[currentImageIndex].src;
  }
}

// ЗАКРЫТЬ МОДАЛ ЕСЛИ НАЖАТЬ НА ПУСТОЕ МЕСТО
document.getElementById("imageModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ЗАКРЫТЬ МОДАЛ НА ESC
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight") nextImage();
  if (e.key === "ArrowLeft") prevImage();
});
</script>
