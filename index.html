<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Салон краси Аннета</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050507;
  --gold:#C9A96E;
  --text:#f4f4f7;
  --muted:#a1a1ad;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.6s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);
}

nav div{
  font-size:11px;
  letter-spacing:.25em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

/* MAIN PHOTO */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(201,169,110,.25), transparent 60%),
    linear-gradient(rgba(0,0,0,.78),rgba(0,0,0,.78)),
    url("./IMG_2117.jpeg") center/cover;
  transform:scale(1.1);
  transition:12s ease;
}

.hero:hover::before{
  transform:scale(1.16);
}

.hero-content{
  position:relative;
  z-index:2;
}

h1{
  font-family:'Cormorant Garamond';
  font-size:58px;
  font-weight:300;
}

p{
  margin-top:10px;
  color:var(--muted);
  font-size:14px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:24px;
  padding:14px 34px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:14px;
  transition:.35s;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* FLOAT */
.float{
  position:fixed;
  bottom:18px;
  right:18px;
  background:var(--gold);
  color:black;
  padding:14px 18px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  z-index:999;
}

/* SECTIONS */
.section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  font-family:'Cormorant Garamond';
  color:var(--gold);
  font-size:34px;
  font-weight:300;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
}

.card{
  background:rgba(255,255,255,.05);
  padding:26px;
  border-radius:16px;
  backdrop-filter:blur(14px);
  transition:.5s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:14px;
  aspect-ratio:1/1;
  object-fit:cover;
  transition:.4s;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.06);
}

/* REVEAL */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:none;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:100px 20px;
}

.small{
  color:var(--muted);
  font-size:13px;
}

/* ===== УСЛУГИ ПОРТФОЛИО ===== */
.services-portfolio {
  padding: 120px 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.services-portfolio h2 {
  font-family: 'Cormorant Garamond';
  color: var(--gold);
  font-size: 38px;
  font-weight: 300;
  margin-bottom: 60px;
  text-align: center;
  letter-spacing: 0.05em;
}

.service-item {
  margin-bottom: 100px;
}

.service-item:last-child {
  margin-bottom: 0;
}

.service-header {
  display: flex;
  align-items: center;
  margin-bottom: 40px;
  gap: 20px;
}

.service-header h3 {
  font-family: 'Cormorant Garamond';
  font-size: 28px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: 0.03em;
  margin: 0;
}

.service-divider {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--gold), transparent);
  margin-left: 20px;
}

.service-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 30px;
  background: linear-gradient(135deg, rgba(201, 169, 110, 0.08) 0%, rgba(201, 169, 110, 0.02) 100%);
  border-radius: 20px;
  border: 1px solid rgba(201, 169, 110, 0.15);
  backdrop-filter: blur(10px);
}

.gallery-image {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  aspect-ratio: 1/1;
  background: rgba(0, 0, 0, 0.3);
  cursor: pointer;
}

.gallery-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s cubic-bezier(0.33, 0.66, 0.66, 1);
  display: block;
}

.gallery-image:hover img {
  transform: scale(1.12) rotate(1deg);
}

.gallery-image::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.3) 100%);
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.gallery-image:hover::after {
  opacity: 1;
}

.gallery-image::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 0%, rgba(201, 169, 110, 0.1) 100%);
  border-radius: 16px;
  pointer-events: none;
  z-index: 1;
}

/* АДАПТИВ */
@media (max-width: 768px) {
  .services-portfolio {
    padding: 80px 15px;
  }

  .services-portfolio h2 {
    font-size: 28px;
    margin-bottom: 40px;
  }

  .service-header {
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 30px;
  }

  .service-header h3 {
    font-size: 22px;
  }

  .service-divider {
    width: 100%;
    margin-left: 0;
    margin-top: 10px;
  }

  .service-item {
    margin-bottom: 60px;
  }

  .service-gallery {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
  }
}

@media (max-width: 480px) {
  .services-portfolio h2 {
    font-size: 24px;
  }

  .service-header h3 {
    font-size: 18px;
  }

  .service-gallery {
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 15px;
  }
}
</style>
</head>

<script>
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>60);
});

const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));
</script>
