<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Salon Anetta</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0f;
  --card:#141420;
  --gold:#C9A96E;
  --text:#eaeaf0;
  --muted:#a0a0aa;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  z-index:100;
  transition:.5s;
}

nav.scrolled{
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(18px);
}

nav div{
  font-size:12px;
  letter-spacing:.15em;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero-bg{
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url("https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?q=80&w=1800")
    center/cover;
  transform:scale(1.05);
  transition:10s;
}

.hero:hover .hero-bg{
  transform:scale(1.12);
}

.hero-content{
  position:relative;
}

h1{
  font-family:'Cormorant Garamond';
  font-weight:300;
  font-size:52px;
}

p{color:var(--muted);margin-top:10px}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 26px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  border-radius:6px;
  transition:.3s;
}

.btn:hover{
  background:var(--gold);
  color:black;
}

/* SECTIONS */
.section{
  padding:90px 20px;
  max-width:1100px;
  margin:auto;
}

.section h2{
  color:var(--gold);
  font-family:'Cormorant Garamond';
  font-weight:300;
  margin-bottom:20px;
}

/* SERVICES */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.card{
  background:var(--card);
  padding:22px;
  border-radius:14px;
  transition:.4s;
}

.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  color:var(--muted);
}

/* ANIMATION */
.reveal{
  opacity:0;
  transform:translateY(25px);
  transition:1s;
}

.reveal.visible{
  opacity:1;
  transform:none;
}

/* FLOAT BUTTON */
.float-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--gold);
  color:black;
  padding:12px 16px;
  border-radius:30px;
  text-decoration:none;
  font-size:12px;
  z-index:200;
}
</style>
</head>

<body>

<nav id="nav">
  <div>Anetta</div>
  <div>Salon</div>
</nav>

<a class="float-btn" href="https://instagram.com/beauty_salon_anetta" target="_blank">
Записатися
</a>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content reveal">
    <h1>Beauty Salon Anetta</h1>
    <p>Краса · стиль · догляд</p>

    <a class="btn" href="https://instagram.com/beauty_salon_anetta" target="_blank">
      Записатися в Instagram
    </a>
  </div>
</section>

<section class="section">
  <h2 class="reveal">Послуги</h2>

  <div class="grid">
    <div class="card reveal">Манікюр</div>
    <div class="card reveal">Брови</div>
    <div class="card reveal">Волосся</div>
    <div class="card reveal">Косметологія</div>
  </div>
</section>

<section class="section">
  <h2 class="reveal">Роботи</h2>

  <div class="gallery">
    <img src="./IMG_2117.jpeg">
    <img src="./IMG_2118.jpeg">
    <img src="./IMG_2119.jpeg">
    <img src="./IMG_2120.jpeg">
    <img src="./IMG_2121.jpeg">
    <img src="./IMG_2122.jpeg">
  </div>
</section>

<div class="lightbox" id="lightbox">
  <img id="lbImg">
</div>

<footer>© 2026 Beauty Salon Anetta</footer>

<script>
// nav
window.addEventListener("scroll",()=>{
  document.getElementById("nav")
  .classList.toggle("scrolled",window.scrollY>50);
});

// reveal
const items=document.querySelectorAll(".reveal");
const io=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add("visible");
  });
});
items.forEach(i=>io.observe(i));

// lightbox
const lb=document.getElementById("lightbox");
const img=document.getElementById("lbImg");

document.querySelectorAll(".gallery img").forEach(i=>{
  i.onclick=()=>{
    lb.style.display="flex";
    img.src=i.src;
  }
});

lb.onclick=()=>lb.style.display="none";
</script>

</body>
</html>
